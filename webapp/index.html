<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spin & Win</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <!-- Balance Section -->
    <div class="balance-section">
      <h2>Your Balance: <span id="balance">0</span> rupees</h2>
    </div>

    <!-- Spin Wheel Section -->
    <div class="wheel-section">
      <h1>🎉 Spin & Win 🎉</h1>
      <div class="wheel-container">
        <div class="wheel" id="wheel">
          <div class="wheel-section">10</div>
          <div class="wheel-section">20</div>
          <div class="wheel-section">5</div>
          <div class="wheel-section">50</div>
          <div class="wheel-section">15</div>
          <div class="wheel-section">30</div>
          <div class="wheel-section">25</div>
          <div class="wheel-section">100</div>
        </div>
        <button id="spinButton">Spin Now</button>
        <div id="result"></div>
      </div>
    </div>

    <!-- Leaderboard Section -->
    <div class="leaderboard-section">
      <h2>🏆 Top Earners 🏆</h2>
      <ul id="leaderboardList"></ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
